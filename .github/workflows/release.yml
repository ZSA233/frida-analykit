name: Release

on:
  push:
    tags:
      - "v*"
      - "!v*-rc.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Stable tag to dry-run, for example v2.0.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Initialize npm cache path
        shell: bash
        run: echo "npm_config_cache=$RUNNER_TEMP/npm-cache" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate dispatch tag format
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          case "$TARGET_TAG" in
            v*-rc.*)
              echo "Stable release dry-run expects a non-RC tag" >&2
              exit 1
              ;;
            v*) ;;
            *)
              echo "workflow_dispatch tag must match vX.Y.Z" >&2
              exit 1
              ;;
          esac

      - uses: ./.github/actions/release-bundle
        with:
          release_tag: ${{ env.TARGET_TAG }}

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ env.TARGET_TAG }}
          path: |
            dist/*.tar.gz
            dist/*.whl
            *.tgz
          if-no-files-found: error

  publish:
    if: ${{ github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ github.ref_name }}
          path: release-bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-bundle/dist/*.tar.gz
            release-bundle/dist/*.whl
            release-bundle/*.tgz
          fail_on_unmatched_files: true

      - name: Publish npm runtime to npmjs
        shell: bash
        run: |
          shopt -s nullglob
          tgz_files=(./release-bundle/*.tgz)
          if [ "${#tgz_files[@]}" -ne 1 ]; then
            echo "expected exactly one npm tarball in ./release-bundle, found ${#tgz_files[@]}" >&2
            printf '  %s\n' "${tgz_files[@]}" >&2
            exit 1
          fi
          npm publish "${tgz_files[0]}" --access public --provenance
